<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="dns-prefetch" href="%VITE_USERCONTENT_UPLOAD_BASE_URL%" />
    <link rel="dns-prefetch" href="%VITE_USERCONTENT_BASE_URL%" />
    <link rel="preconnect" href="%VITE_USERCONTENT_BASE_URL%" crossorigin />

    <title>XBuilder</title>
    <meta name="description" content="XBuilder is a tool for building games. We create it to help children to learn abilities to build." />
    <meta name="keywords" content="XBuilder, game development for kids, educational coding tools, STEM education, creative game building, children's programming, learn to code for kids" />

    <link rel="icon" href="/src/assets/logo.svg" />
    <meta name="referrer" content="never" />
    
    <style>
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>

  <body>
    <div id="app"></div>
    <script src="https://open.mobile.qq.com/sdk/qqapi.js?_bid=152" id="qq-api-script"></script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      (function() {
        // 创建调试面板
        const debugPanel = document.createElement('div');
        debugPanel.id = 'qq-api-debug';
        debugPanel.style.cssText = `
          position: fixed;
          bottom: 0;
          left: 0;
          right: 0;
          background: rgba(0,0,0,0.85);
          color: #0f0;
          padding: 15px;
          font-family: monospace;
          font-size: 14px;
          z-index: 99999;
          max-height: 40vh;
          overflow: auto;
          border-top: 2px solid #00ff00;
        `;
        
        // 创建关闭按钮
        const closeBtn = document.createElement('button');
        closeBtn.textContent = '关闭调试';
        closeBtn.style.cssText = `
          position: absolute;
          top: 5px;
          right: 10px;
          background: #ff0000;
          color: white;
          border: none;
          padding: 5px 10px;
          cursor: pointer;
        `;
        
        // 调试信息容器
        const debugInfo = document.createElement('pre');
        debugInfo.style.margin = '0';
        debugInfo.style.whiteSpace = 'pre-wrap';
        debugInfo.style.wordBreak = 'break-all';
        
        debugPanel.appendChild(debugInfo);
        debugPanel.appendChild(closeBtn);
        document.body.appendChild(debugPanel);
        
        // 关闭按钮事件
        closeBtn.onclick = function() {
          debugPanel.style.display = 'none';
        };
        
        // 检测QQ对象是否存在
        function checkQQObjects() {
          const objects = ['mqq', 'QQJSBridge', 'jsBridge', 'QQApi'];
          const result = {};
          
          objects.forEach(obj => {
            const exists = window[obj] !== undefined;
            const type = exists ? typeof window[obj] : 'undefined';
            let properties = [];
            
            if (exists && window[obj] !== null) {
              try {
                properties = Object.keys(window[obj]).slice(0, 20); // 只取前20个属性
              } catch (e) {
                properties = ['无法获取属性列表'];
              }
            }
            
            result[obj] = {
              exists,
              type,
              properties
            };
          });
          
          return result;
        }
        
        // 获取脚本加载状态
        function getScriptStatus() {
          const scripts = document.getElementById('qq-api-script');
          let status = '未找到QQ API脚本';
          
          for (let i = 0; i < scripts.length; i++) {
            if (scripts[i].src.includes('qqapi.js')) {
              status = scripts[i].readyState === 'complete' ? 
                '加载成功' : 
                `加载中 (状态: ${scripts[i].readyState || '未定义'})`;
              break;
            }
          }
          
          return status;
        }
        
        // 生成调试信息
        function generateDebugInfo() {
          const scriptStatus = getScriptStatus();
          const qqObjects = checkQQObjects();
          const ua = navigator.userAgent;
          const platform = /Android/i.test(ua) ? 'Android' : /iPhone|iPad/i.test(ua) ? 'iOS' : '未知';
          
          let info = `=== QQ API注入检测 ===
  [脚本状态]
  ${scriptStatus}
  
  [平台检测]
  平台: ${platform}
  UserAgent: ${ua}
  
  [全局对象检测]
  `;
          
          for (const [obj, data] of Object.entries(qqObjects)) {
            info += `
  ${obj}:
    存在: ${data.exists}
    类型: ${data.type}
    属性: ${data.properties.length > 0 ? data.properties.join(', ') : '无'}
  `;
          }
          
          // 添加时间戳
          info += `\n检测时间: ${new Date().toLocaleString()}`;
          
          return info;
        }
        
        // 更新调试信息
        function updateDebugInfo() {
          debugInfo.textContent = generateDebugInfo();
        }
        
        // 初始检测
        updateDebugInfo();
        
        // 持续监控（每2秒更新一次）
        setInterval(updateDebugInfo, 2000);
        
        // 监听脚本加载事件
        document.addEventListener('readystatechange', updateDebugInfo);
        window.addEventListener('load', updateDebugInfo);
        
        // 添加错误监听
        window.addEventListener('error', function(event) {
          debugInfo.textContent += `\n\n[脚本错误] ${event.message}\n位置: ${event.filename}:${event.lineno}:${event.colno}`;
        });
      })();
    </script>   
  </body>
</html>
