<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport"
		content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no">
	<title>XGo Builder</title>
	<style>
		body,
		html {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			display: flex;
			justify-content: center;
			align-items: center;
			background-color: #333;
			overflow: hidden;
		}

		canvas {
			display: block;
			margin: 0;
			outline: none;
		}
	</style>
</head>

<body>
	<div id="tabs">
		<div id="tab-loader">
		</div>
		<div id="tab-editor" style="display: none;">
			<canvas id="editor-canvas" tabindex="1"></canvas>
		</div>
		<div id="tab-game" style="display: none;">
			<canvas id="game-canvas" tabindex="2"></canvas>
		</div>
	</div>
	<script>var miniEngine = null</script>
	<script>var isWasmCompressed = false</script>
	<script src="go.wasm.exec.js"></script>
	<script src="storage.manager.js"></script>
	<script src="worker.message.manager.js"></script>
	<script src="engine.js"></script>
	<script src="game.js"></script>
	<script>
		"use strict";
		let gameApp = null
		let isShowEditor = false
		let onGameError = null
		let _onSpxReady = null
		let lastGameApp = null

		window.spxIsProxyThreadMode = false
		let onGameExit = null
		function onProgress(value) {
			const progressEvent = new CustomEvent('onProgress', {
				detail: {
					progress: value
				}
			});
			window.dispatchEvent(progressEvent);
			if (value >= 1) {
				document.getElementById('tab-game').style.display = 'none';
				document.getElementById('tab-editor').style.display = 'none';
				document.getElementById('tab-loader').style.display = 'none';
				let canvas = null
				if (gameApp.isEditor) {
					if (isShowEditor) {
						document.getElementById('tab-editor').style.display = 'block';
					}
					canvas = document.getElementById('editor-canvas')
				} else {
					document.getElementById('tab-game').style.display = 'block';
					canvas = document.getElementById('game-canvas')
				}
				canvas.width = window.innerWidth;
				canvas.height = window.innerHeight;
			}
		}

		window.gdspx_on_runtime_panic = function (msg) {
			if (onGameError != null) {
				onGameError(msg)
			}
		}
		window.onGameError = function (callback) {
			onGameError = callback
		}

		window.gdspx_on_runtime_exit = function (code) {
			if (onGameExit != null) {
				onGameExit(code)
			}
		}

		window.onGameExit = function (callback) {
			onGameExit = callback
		}
		
		window.startGame = async (buffer, assetURLs = null, onSpxReady = null, cfg = null) => {
			isShowEditor = false
			lastGameApp = null
			_onSpxReady = onSpxReady
			if(EnginePackMode == "worker"){
				window.setAIDescription = function (description) {
					gameApp.callWorkerFunction("setAIDescription", description)
				}
				window.setAIInteractionAPIEndpoint = function (endpoint) {
					gameApp.callWorkerFunction("setAIInteractionAPIEndpoint", endpoint)
				}
				window.setAIInteractionAPITokenProvider = function (tokenProviderFunction) {
					gameApp.callWorkerFunction("setAIInteractionAPITokenProvider", tokenProviderFunction)
				}

				window.onWasmLoaded = function () {
					if (_onSpxReady != null) {
						_onSpxReady()
					}
				}
				window.onGameStarted = function () {
				}
			}
			const config = {
				'projectName': "spx_game",
				'onProgress': onProgress,
				"gameCanvas": document.getElementById('game-canvas'),
				"projectData": new Uint8Array(buffer),
				"logLevel": LOG_LEVEL_NONE,
				"useAssetCache": false,
				"isRuntimeMode": true,
				"assetURLs": {
					"engine.zip": "/engine.zip",
					"game.zip": "/game.zip",
					"gdspx.wasm": "/gdspx.wasm",
					"engine.wasm": "/engine.wasm",
				},
				"onSpxReady": onSpxReady,
				"recordingOnGameStart": false,
				"autoDownloadRecordedVideo":false,
			};
			if (assetURLs != null) {
				config.assetURLs = assetURLs
			}
			if (cfg != null) {
				Object.assign(config, cfg)
			}

			if (gameApp != null) {
				await gameApp.StopProject();
			}

			// try install project and run game
			gameApp = new GameApp(config);
			await gameApp.RunGame();
		}
		
		// Starts recording the game canvas content as video
		window.startRecording = () => {
			if (gameApp == null) {
				console.error("gameApp is null, should call startGame first")
				return
			}
			gameApp.startRecording()
		}
		// Stops the current recording session and returns the result as a Blob.
		window.stopRecording = async () => {
			if (gameApp == null) {
				console.error("gameApp is null, should call startGame first")
				return
			}
			return await gameApp.stopRecording()
		}

		// Returns the recorded video as a Blob.
		window.getRecordedVideo = () => {
			let app = gameApp || lastGameApp
			if (app == null) {
				console.error("gameApp is null, should call startGame first")
				return null
			}
			
			try {
				// 检查应用是否有录制数据
				if (typeof app.getRecordedVideo !== 'function') {
					console.error("getRecordedVideo method not available")
					return null
				}
				
				// 增加详细日志
				console.log("准备调用 app.getRecordedVideo()...")
				console.log("app 状态:", {
					isGameApp: app === gameApp,
					isLastGameApp: app === lastGameApp,
					hasRecordMethod: typeof app.getRecordedVideo === 'function'
				})
				
				const result = app.getRecordedVideo()
				console.log("getRecordedVideo result:", {
					type: typeof result,
					isBlob: result instanceof Blob,
					isPromise: result instanceof Promise,
					constructor: result?.constructor?.name,
					size: result instanceof Blob ? result.size : 'N/A',
					resultSample: result instanceof Blob ? '[Blob object]' : 
					             result instanceof Promise ? '[Promise object]' : 
					             (typeof result === 'string' ? result.substring(0, 100) : result)
				})
				
				// 验证结果
				if (result === null || result === undefined) {
					console.warn("getRecordedVideo 返回了 null 或 undefined")
					return null
				}
				
				if (result instanceof Blob && result.size === 0) {
					console.warn("getRecordedVideo 返回了空的 Blob")
					return null
				}
				
				// 清理 lastGameApp 引用
				if (app === lastGameApp) {
					lastGameApp = null
				}
				
				return result
			} catch (error) {
				console.error("getRecordedVideo failed:", error)
				console.error("错误堆栈:", error.stack)
				
				// 提供更详细的错误上下文
				console.error("错误上下文:", {
					appType: app === gameApp ? 'gameApp' : 'lastGameApp',
					hasApp: !!app,
					appMethods: app ? Object.getOwnPropertyNames(app).filter(name => typeof app[name] === 'function') : []
				})
				
				// 清理 lastGameApp 引用
				if (app === lastGameApp) {
					lastGameApp = null
				}
				return null
			}
		}

		// Captures the current game screen and returns its binary data as a Blob.
		window.getScreenshot = async () => {
			let gameCanvas = document.getElementById('game-canvas')
			if (!gameCanvas) {
				console.error("gameCanvas not found")
				return null
			}
			if (!gameCanvas.toBlob) {
				console.error("gameCanvas.toBlob not supported")
				return null
			}
			return new Promise((resolve) => {
				gameCanvas.toBlob((blob) => {
					resolve(blob)
				}, 'image/png')
			})
		}

		window.downloadRecordedVideo = (filename) => {
			let app = gameApp || lastGameApp
			if (app == null) {
				console.error("gameApp is null, should call startGame first")
				return null
			}
			lastGameApp = null
			app.downloadRecordedVideo(filename)
		}


		window.stopGame = async () => {
			if (gameApp == null) {
				console.error("gameApp is null, should call startGame first")
				return
			}
			await gameApp.StopGame()
			lastGameApp = gameApp
			gameApp = null
		}

		window.pauseGame = () => {
			if (gameApp == null) {
				console.error("gameApp is null, should call startGame first")
				return
			}
			gameApp.pause();
		}

		window.resumeGame = () => {
			if (gameApp == null) {
				console.error("gameApp is null, should call startGame first")
				return
			}
			gameApp.resume();
		}

		window.stepNextFrame = () => {
			if (gameApp == null) {
				console.error("gameApp is null, should call startGame first")
				return
			}
			gameApp.stepNextFrame();
		}
		
		// Inform the parent window that the runner is ready (methods on the window object are callable)
		window.dispatchEvent(new Event('runnerReady'));

		// Listen for messages from parent window
		window.addEventListener('message', function(event) {
			if (event.data.type === 'startRecording') {
				window.startRecording()
			} else if (event.data.type === 'stopRecording') {
				window.stopRecording().then(blob => {
					// Send the recorded video blob back to parent
					event.source.postMessage({
						type: 'recordingCompleted',
						blob: blob
					}, event.origin)
				})
			} else if (event.data.type === 'pauseGame') {
				window.pauseGame()
			} else if (event.data.type === 'resumeGame') {
				window.resumeGame()
			}
		})
	</script>
</body>

</html>
